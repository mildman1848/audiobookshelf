---
services:
  audiobookshelf:
    image: ${DOCKER_REPO:-mildman1848/audiobookshelf}:${VERSION:-latest}
    container_name: ${CONTAINER_NAME:-audiobookshelf}
    environment:
      # LinuxServer.io Standard Variables
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Berlin}
      - UMASK=${UMASK:-022}

      # Audiobookshelf Configuration
      - PORT=${PORT:-80}
      - HOST=${HOST:-0.0.0.0}
      - FFMPEG_PATH=${FFMPEG_PATH:-/usr/bin/ffmpeg}
      - FFPROBE_PATH=${FFPROBE_PATH:-/usr/bin/ffprobe}
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # Secrets using FILE__ prefix (LinuxServer.io standard)
      # These point to files in /run/secrets/ directory
      - FILE__JWT_SECRET_KEY=/run/secrets/audiobookshelf_jwt_secret
      - FILE__SESSION_SECRET=/run/secrets/audiobookshelf_session_secret
    volumes:
      # Testing: Try bind mount without security restrictions
      - ${CONFIG_PATH:-./config}:/config
      - ${DATA_PATH:-./data}:/data
      - ${AUDIOBOOKS_PATH:-./data/audiobooks}:/data/audiobooks
      - ${PODCASTS_PATH:-./data/podcasts}:/data/podcasts
    secrets:
      - audiobookshelf_jwt_secret
      - audiobookshelf_session_secret
    ports:
      - "${HOST_BIND:-0.0.0.0}:${EXTERNAL_PORT:-13378}:${PORT:-80}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-80}/healthcheck"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - audiobookshelf_network

networks:
  audiobookshelf_network:
    driver: bridge

secrets:
  audiobookshelf_jwt_secret:
    file: ./secrets/audiobookshelf_jwt_secret.txt
  audiobookshelf_session_secret:
    file: ./secrets/audiobookshelf_session_secret.txt
