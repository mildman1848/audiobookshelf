name: Mirror Container Images to GitLab & Codeberg

on:
  workflow_run:
    workflows: ["Docker Build & Publish"]
    types:
      - completed
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Source tag to mirror (e.g., 2.30.0)'
        required: true
        default: 'latest'

env:
  SOURCE_REGISTRY: ghcr.io
  SOURCE_IMAGE: mildman1848/audiobookshelf
  GITLAB_REGISTRY: registry.gitlab.com
  CODEBERG_REGISTRY: codeberg.org

jobs:
  mirror-to-gitlab-registry:
    name: Mirror to GitLab Container Registry
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Determine tags to mirror
        id: tags
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            TAG="${TAG#v}"  # Remove 'v' prefix
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.source_tag }}"
          else
            TAG="latest"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Mirroring tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to source registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SOURCE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Log in to GitLab Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITLAB_REGISTRY }}
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Pull and push to GitLab
        env:
          TAG: ${{ steps.tags.outputs.tag }}
        run: |
          SOURCE="${SOURCE_REGISTRY}/${SOURCE_IMAGE}:${TAG}"
          TARGET="${GITLAB_REGISTRY}/${{ secrets.GITLAB_USERNAME }}/audiobookshelf:${TAG}"

          echo "📥 Pulling from ${SOURCE}"
          docker pull ${SOURCE}

          echo "🏷️  Tagging as ${TARGET}"
          docker tag ${SOURCE} ${TARGET}

          echo "📤 Pushing to GitLab"
          docker push ${TARGET}

          # Also push 'latest' tag if mirroring a version tag
          if [[ "${TAG}" != "latest" ]]; then
            LATEST_TARGET="${GITLAB_REGISTRY}/${{ secrets.GITLAB_USERNAME }}/audiobookshelf:latest"
            docker tag ${SOURCE} ${LATEST_TARGET}
            docker push ${LATEST_TARGET}
          fi

          echo "✅ Successfully pushed to GitLab Container Registry"

  mirror-to-codeberg-registry:
    name: Mirror to Codeberg Container Registry
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Determine tags to mirror
        id: tags
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            TAG="${TAG#v}"  # Remove 'v' prefix
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.source_tag }}"
          else
            TAG="latest"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Mirroring tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to source registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SOURCE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Log in to Codeberg Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CODEBERG_REGISTRY }}
          username: ${{ secrets.CODEBERG_USERNAME }}
          password: ${{ secrets.CODEBERG_TOKEN }}

      - name: Pull and push to Codeberg
        env:
          TAG: ${{ steps.tags.outputs.tag }}
        run: |
          SOURCE="${SOURCE_REGISTRY}/${SOURCE_IMAGE}:${TAG}"
          TARGET="${CODEBERG_REGISTRY}/${{ secrets.CODEBERG_USERNAME }}/audiobookshelf:${TAG}"

          echo "📥 Pulling from ${SOURCE}"
          docker pull ${SOURCE}

          echo "🏷️  Tagging as ${TARGET}"
          docker tag ${SOURCE} ${TARGET}

          echo "📤 Pushing to Codeberg"
          docker push ${TARGET}

          # Also push 'latest' tag if mirroring a version tag
          if [[ "${TAG}" != "latest" ]]; then
            LATEST_TARGET="${CODEBERG_REGISTRY}/${{ secrets.CODEBERG_USERNAME }}/audiobookshelf:latest"
            docker tag ${SOURCE} ${LATEST_TARGET}
            docker push ${LATEST_TARGET}
          fi

          echo "✅ Successfully pushed to Codeberg Container Registry"

  summary:
    name: Mirror Registry Summary
    runs-on: ubuntu-latest
    needs: [mirror-to-gitlab-registry, mirror-to-codeberg-registry]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🐳 Container Mirror Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| GitLab Container Registry | ${{ needs.mirror-to-gitlab-registry.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Codeberg Container Registry | ${{ needs.mirror-to-codeberg-registry.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🕒 **Mirror Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.mirror-to-gitlab-registry.result }}" == "success" ]]; then
            echo "✅ **GitLab:** Images successfully mirrored" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **GitLab:** Mirror failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.mirror-to-codeberg-registry.result }}" == "success" ]]; then
            echo "✅ **Codeberg:** Images successfully mirrored" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Codeberg:** Mirror failed" >> $GITHUB_STEP_SUMMARY
          fi
