name: Mirror Sync to GitLab and Codeberg

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  schedule:
    # Sync every 6 hours to catch any missed updates
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  GITLAB_REPO: gitlab.com/${{ secrets.GITLAB_USERNAME }}/audiobookshelf.git
  CODEBERG_REPO: codeberg.org/${{ secrets.CODEBERG_USERNAME }}/audiobookshelf.git

jobs:
  mirror-to-gitlab:
    name: Mirror to GitLab
    runs-on: ubuntu-latest
    if: github.repository == 'mildman1848/audiobookshelf'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for mirror
          fetch-tags: true

      - name: Setup Git config
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Mirror to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
        run: |
          # Add GitLab as remote
          git remote add gitlab https://${GITLAB_USERNAME}:${GITLAB_TOKEN}@${GITLAB_REPO} || \
          git remote set-url gitlab https://${GITLAB_USERNAME}:${GITLAB_TOKEN}@${GITLAB_REPO}

          # Push all branches and tags
          git push --mirror gitlab || true

          echo "✅ Successfully mirrored to GitLab"

  mirror-to-codeberg:
    name: Mirror to Codeberg
    runs-on: ubuntu-latest
    if: github.repository == 'mildman1848/audiobookshelf'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for mirror
          fetch-tags: true

      - name: Setup Git config
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Mirror to Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          CODEBERG_USERNAME: ${{ secrets.CODEBERG_USERNAME }}
        run: |
          # Add Codeberg as remote
          git remote add codeberg https://${CODEBERG_USERNAME}:${CODEBERG_TOKEN}@${CODEBERG_REPO} || \
          git remote set-url codeberg https://${CODEBERG_USERNAME}:${CODEBERG_TOKEN}@${CODEBERG_REPO}

          # Push all branches and tags
          git push --mirror codeberg || true

          echo "✅ Successfully mirrored to Codeberg"

  summary:
    name: Mirror Sync Summary
    runs-on: ubuntu-latest
    needs: [mirror-to-gitlab, mirror-to-codeberg]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🔄 Mirror Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Mirror | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| GitLab | ${{ needs.mirror-to-gitlab.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Codeberg | ${{ needs.mirror-to-codeberg.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🕒 **Sync Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
