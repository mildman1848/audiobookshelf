name: Greetings

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - name: Greet first-time contributors
        uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Thanks for opening your first issue in **audiobookshelf**!

            📋 Please ensure:
            - You've checked existing issues for duplicates
            - You've followed the issue template
            - You've provided all requested information

            Our team will review your issue as soon as possible. If you'd like to contribute a fix, check out our [contributing guidelines](../blob/main/CONTRIBUTING.md).

            **Note:** This is an enhanced LinuxServer.io-based container for audiobookshelf. For upstream application issues, please report to the [official audiobookshelf repository](https://github.com/advplyr/audiobookshelf).
          pr-message: |
            🎉 Thanks for opening your first pull request in **audiobookshelf**!

            ✅ Please ensure:
            - Your PR follows our [contributing guidelines](../blob/main/CONTRIBUTING.md)
            - All tests pass and the code builds successfully
            - You've updated documentation if needed
            - You've added/updated tests for your changes

            **Pre-merge checklist:**
            - [ ] `make validate` passes (hadolint)
            - [ ] `make build` succeeds
            - [ ] `make test` passes (container health checks)
            - [ ] `make security-scan` completes

            Our team will review your PR soon. Thank you for contributing! 🚀
