# Hadolint Configuration for Audiobookshelf Docker Image
# Documentation: https://github.com/hadolint/hadolint

# Ignore specific rules with justification
ignored:
  - DL3003  # cd instead of WORKDIR (needed for git operations)
  - DL3018  # Pin versions in apk add (LinuxServer.io manages versions)
  - DL3059  # Multiple consecutive RUN (multi-stage build structure)
  - DL4006  # Set pipefail (Alpine shell compatibility)

# Trusted registries (bypass image checks)
trustedRegistries:
  - docker.io
  - ghcr.io
