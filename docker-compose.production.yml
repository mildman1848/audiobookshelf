---
# Production-ready docker-compose configuration with maximum security
# Usage: docker-compose -f docker-compose.yml -f docker-compose.production.yml up -d

services:
  audiobookshelf:
    # Bind to localhost only (requires reverse proxy)
    ports:
      - "127.0.0.1:8080:8080"

    # Read-only root filesystem
    read_only: true

    # Temporary filesystems with strict permissions
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=50M,mode=1777
      - /var/tmp:rw,noexec,nosuid,size=50M,mode=1777
      - /run:rw,noexec,nosuid,size=10M,mode=755

    # Maximum security options
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default

    # Drop all capabilities
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    # Strict resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
          pids: 200

    # Structured logging with rotation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "production"

    # Always restart in production
    restart: always

    # Internal network only
    networks:
      - internal

networks:
  internal:
    driver: bridge
    internal: false
